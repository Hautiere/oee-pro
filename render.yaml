services:
  - type: web
    name: oee-pro-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oee-pro-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: '["https://oee-pro-frontend.onrender.com"]'
      - key: ENVIRONMENT
        value: production

  - type: web
    name: oee-pro-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://oee-pro-backend.onrender.com/api/v1

databases:
  - name: oee-pro-db
    databaseName: oee_pro
    plan: free
