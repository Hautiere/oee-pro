version: "3.9"

# Option 2 : PostgreSQL dans Docker, backend et frontend en local
#
# Démarrage :
#   docker compose up db          → PostgreSQL uniquement
#   docker compose up db -d       → en arrière-plan
#
# Pour lancer tout en Docker (prod-like) :
#   docker compose --profile full up

services:

  db:
    image: postgres:16-alpine
    container_name: oee_pro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend — profil "full" uniquement (prod-like)
  backend:
    profiles: ["full"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oee_pro_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend — profil "full" uniquement
  frontend:
    profiles: ["full"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oee_pro_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
